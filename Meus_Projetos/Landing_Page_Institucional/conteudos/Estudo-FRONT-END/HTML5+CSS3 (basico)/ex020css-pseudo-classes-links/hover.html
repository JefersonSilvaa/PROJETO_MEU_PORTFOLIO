<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div > p{
            display: none;
        }
        div:hover > p {
            display: block;
            color: rgb(0, 0, 0);
            background-color: rgb(255, 0, 0);
            width: 100px;
            height: 70px;
            text-align: center;
            padding: 4px;
        }
        div:hover{
            color: rgb(247, 0, 0);
        }
    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <p>passe o mouse sobre o texto abaixo</p>
    <div>
        passe o mouse aqui
        <p> <a href="pseudoclasses.html">jogos</a> <br> inicio <br> pesquisar <br> back </p>
    </div>
    <p>fim do exemplo...</p>
</body>
</html>
