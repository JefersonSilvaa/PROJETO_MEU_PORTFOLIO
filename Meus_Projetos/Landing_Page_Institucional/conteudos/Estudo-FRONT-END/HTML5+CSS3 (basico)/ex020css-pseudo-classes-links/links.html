<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        li{
            display: inline-flex;
            background-color: aqua;
            width: 100px;
            height: 100px;
            padding: 5px;
            font-size: 18px;
            border-radius: 24px;           
        }
        a{
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover{
            text-decoration: underline;
            color: green;
        } 
        .especial::before{
            content: '(links) ';
            background-color: rgb(19, 0, 128);
            width: 10px;
            padding: 1px;
            border-radius: 24px;
        }
        .especial::after{
            content: '(links) ';
            background-color: rgb(19, 0, 128);
            width: 10px;
            padding: 1px;
            border-radius: 24px; 
        }
    </style>
</head>
<body>
    <h1>personalizando links</h1>
    <ul>
        <li><a class="especial" href="http://gustavoguanabara.github.io" target="_blank" >repositorio gihub</a></li>
        <li><a href="http://youtube.com" target="_blank" >canal do youtube</a></li>
        <li><a href="https//www.cursoemvideo.com" target="_blank">site di curso em video</a></li>
    </ul>
</body>
</html>
