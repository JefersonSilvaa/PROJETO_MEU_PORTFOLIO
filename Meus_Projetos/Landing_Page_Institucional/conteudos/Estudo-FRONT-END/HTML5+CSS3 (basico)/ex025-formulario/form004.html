<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <h1>exemplo de formulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">nome:</label>
                <input type="text" name="nome" id="inome" required maxlength="50" size="21" autocomplete="name">
            </p>
            <p>
                <label for="imail">E-mail:</label>
                <input type="email" name="mail" id="imail" required autocomplete="email">
            </p>
                <p>
                    <label for="itel">telefone:</label>
                    <input type="tel" name="tel" id="itel" autocomplete="tel" required pattern="^[0-9]{5}-[0-9]{5}$" placeholder="(xx)xxxxx-xxxx">
                </p>
        </fieldset>
            <!--estudar mais sobre RegEx-->
            <p>
            <input type="submit" value="enviar">
            <input type="reset" value="apagar">
        </p>
    </form>
</body>
</html>
