<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midias em html5 </title>
</head>
<body>
    <h1>imagem dinamica</h1>
    <p>tente abrir esse site em varios dispositivos diferentes ou simplesmente tente muda tamanho da site ! </p>

    <picture>
        <source media="(max-width:750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem-flexivel">
    </picture>
<hr>
    <h1>repoduzindo audio em html 5</h1>
    <h2>alessia_cara_scars 🎵🔊</h2>
    <audio src="midia/musicav1.mp3" controls autoplay loop></audio>
<hr>
    <h1>
        alessia_cara_scars🔊
    </h1>
    <audio controls autoplay"> 
          <source src="midia/musicav1.mp3" type="audio/mpeg">
          <source src="midia/musicav1.mp3" type="audio/wav">
          <p><code>infelizmente seu dispositivo não é , compativel com sistema.</code></p>
    </audio>
    <hr>

</body>
</html>
