<body>
    <script>
        var nome = window.prompt('olá seja bem vindo, qual é o seu nome??? ')
        document.write(`seu ${nome} tem ${nome.length} letras </br>`)
        document.writeln(`seu nome em letras 'maiúsculas' é assim ${nome.toUpperCase()} </br>`)
        document.writeln(`seu nome em letras 'minúscula' é assim ${nome.toLowerCase()} `)


        /*
            toUpperCase == nome com letra maiúscula
            toLowerCase == nome com letra minúscula
            lenght == número de letra , da string 

            tudo pode ser aplicado dentro do var,left,cosnt
        */
    </script>
