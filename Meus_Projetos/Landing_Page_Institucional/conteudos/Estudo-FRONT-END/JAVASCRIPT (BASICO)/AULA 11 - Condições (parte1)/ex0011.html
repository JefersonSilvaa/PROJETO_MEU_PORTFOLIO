<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>condições</title>
    <style>
        body{
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
        }
        body > div#resultado{
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <h1>Olá seja bem-vindo!!! , Em qual pais você vive??</h1>
     informe seu pais atual - <input type="text" name="txtpais" id="txtpais">
     <input type="button" value="verificar" onclick="verificarPais()"> ???
     <div id="resultado"></div>

     <script>
        function verificarPais(){
            var txtpais = document.querySelector('input#txtpais').value
            var resultadoPais = document.querySelector('div#resultado')
            if(txtpais == 'Brasil'){
                resultadoPais.innerHTML = 'seja bem-vindo , Você é <strong> brasileiro !!! </strong>'
            } else {
                resultadoPais.innerHTML = `seja bem-vindo Brasil , Você é estrangeiro do pais : <strong> ${txtpais} !!! </strong> `
            }
        }
     </script>
</body>
</html>
