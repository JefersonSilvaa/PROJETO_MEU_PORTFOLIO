<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanStyle Store | Admin</title>
  <link rel="stylesheet" href="css/style.css?v=20260414-1835" />
</head>
<body id="admin-page">
  <header class="topbar">
    <div class="container nav-wrap">
      <button id="menuToggle" class="menu-toggle" aria-label="Abrir menu">Menu</button>
      <a href="index.html" class="logo">UrbanStyle <span>Store</span></a>

      <nav id="navLinks" class="nav-links">
        <a href="index.html">Home</a>
        <a href="carrinho.html">Carrinho</a>
        <a href="admin.html" class="active">Admin</a>
      </nav>

      <div class="nav-actions">
        <a href="carrinho.html" class="cart-icon" aria-label="Ir para carrinho">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="20" r="1"></circle>
              <circle cx="18" cy="20" r="1"></circle>
              <path d="M2 3h3l2.6 11.2a2 2 0 0 0 2 1.5h8.7a2 2 0 0 0 1.9-1.4L22 7H6"></path>
            </svg>
          </span>
          <span id="cartCountBadge" class="badge">0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="container admin-layout">
    <section class="admin-form-panel">
      <h1>Painel Admin</h1>
      <p>Crie, edite e exclua produtos com persistencia em localStorage.</p>

      <form id="productForm" class="admin-form">
        <input type="hidden" id="productId" />

        <label>
          Nome
          <input type="text" id="productName" required />
        </label>

        <label>
          Preco
          <input type="number" id="productPrice" min="0" step="0.01" required />
        </label>

        <label>
          Categoria
          <select id="productCategory" required>
            <option value="">Selecione</option>
            <option value="roupas">Roupas</option>
            <option value="calcados">Calcados</option>
          </select>
        </label>

        <label>
          URL da imagem
          <input type="url" id="productImage" placeholder="Opcional: cole uma URL personalizada" />
        </label>

        <label>
          Descricao
          <input type="text" id="productDescription" placeholder="Ex.: Tecido premium e ajuste confortavel" required />
        </label>

        <label>
          Cores (separadas por virgula)
          <input type="text" id="productColors" placeholder="Preto, Branco, Azul" required />
        </label>

        <label>
          Tamanhos (separados por virgula)
          <input type="text" id="productSizes" placeholder="P, M, G, GG" required />
        </label>

        <label>
          Estoque
          <input type="number" id="productStock" min="1" step="1" value="15" required />
        </label>

        <div class="admin-form-actions">
          <button type="submit" class="btn btn-primary">Salvar produto</button>
          <button type="button" id="clearFormBtn" class="btn btn-ghost">Limpar</button>
        </div>
      </form>
    </section>

    <section class="admin-list-panel">
      <h2>Produtos cadastrados</h2>
      <div id="adminProductsList" class="admin-products"></div>
      <p id="adminEmptyState" class="empty-state hidden">Nao ha produtos cadastrados.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>(c) <span id="year"></span> UrbanStyle Store. Todos os direitos reservados.</p>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="carrinho.html">Carrinho</a>
        <a href="admin.html">Admin</a>
      </div>
    </div>
  </footer>

  <div id="toastContainer" class="toast-container"></div>

  <script src="js/products.js?v=20260414-1835"></script>
  <script src="js/cart.js?v=20260414-1835"></script>
  <script src="js/admin.js?v=20260414-1835"></script>
  <script src="js/main.js?v=20260414-1835"></script>
</body>
</html>
